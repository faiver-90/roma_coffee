name: DB Backup to Google Drive

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Create database dump
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "RAILWAY_DATABASE_URL is not set"
            exit 1
          fi
          BACKUP_DATE="$(TZ=Europe/Moscow date +%Y-%m-%d)"
          BACKUP_TIME="$(TZ=Europe/Moscow date +%H-%M-%S)"
          BACKUP_FILE="roma_coffee_${BACKUP_DATE}_${BACKUP_TIME}.sql"
          docker run --rm \
            -e DATABASE_URL="${DATABASE_URL}" \
            -v "${PWD}:/work" \
            postgres:18 \
            pg_dump --dbname="${DATABASE_URL}" --format=plain --no-owner --no-privileges --file="/work/${BACKUP_FILE}"
          echo "BACKUP_FILE=${BACKUP_FILE}" >> "${GITHUB_ENV}"

      - name: Decode rclone config
        env:
          RCLONE_CONFIG_B64: ${{ secrets.RCLONE_CONFIG_B64 }}
        run: |
          if [ -z "${RCLONE_CONFIG_B64}" ]; then
            echo "RCLONE_CONFIG_B64 is not set"
            exit 1
          fi
          echo "${RCLONE_CONFIG_B64}" | base64 -d > rclone.conf

      - name: Upload dump to Google Drive folder
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          if [ -z "${GDRIVE_FOLDER_ID}" ]; then
            echo "GDRIVE_FOLDER_ID is not set"
            exit 1
          fi
          rclone --config rclone.conf copy "${BACKUP_FILE}" gdrive: --drive-root-folder-id "${GDRIVE_FOLDER_ID}" -v

      - name: Verify uploaded backup exists
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          rclone --config rclone.conf lsf gdrive: --drive-root-folder-id "${GDRIVE_FOLDER_ID}"
          rclone --config rclone.conf lsf gdrive: --drive-root-folder-id "${GDRIVE_FOLDER_ID}" | grep -F "${BACKUP_FILE}"

      - name: Cleanup old dumps (older than 30 days)
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          rclone --config rclone.conf delete gdrive: --drive-root-folder-id "${GDRIVE_FOLDER_ID}" --min-age 30d
